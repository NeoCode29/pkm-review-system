# =======================================================
# PKM Review — Nginx Reverse Proxy Config
# =======================================================

# Docker internal DNS resolver
resolver 127.0.0.11 valid=30s ipv6=off;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name rpbpkm.web.id www.rpbpkm.web.id api.rpbpkm.web.id auth.rpbpkm.web.id;

    # Certbot challenge (untuk SSL renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------------------------------------------
# Frontend — rpbpkm.web.id
# -------------------------------------------------------
server {
    listen 443 ssl;
    server_name rpbpkm.web.id www.rpbpkm.web.id;

    ssl_certificate     /etc/nginx/ssl/live/rpbpkm.web.id/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/rpbpkm.web.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        set $upstream_frontend http://frontend:3000;
        proxy_pass         $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        set $upstream_frontend http://frontend:3000;
        proxy_pass       $upstream_frontend;
        proxy_cache_valid 200 1y;
        add_header       Cache-Control "public, max-age=31536000, immutable";
    }
}

# -------------------------------------------------------
# Backend API — api.rpbpkm.web.id
# -------------------------------------------------------
server {
    listen 443 ssl;
    server_name api.rpbpkm.web.id;

    ssl_certificate     /etc/nginx/ssl/live/rpbpkm.web.id/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/rpbpkm.web.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 60M;

    location / {
        set $upstream_backend http://backend:4000;
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# -------------------------------------------------------
# Supabase (Auth + Storage) — auth.rpbpkm.web.id
# -------------------------------------------------------
server {
    listen 443 ssl;
    server_name auth.rpbpkm.web.id;

    ssl_certificate     /etc/nginx/ssl/live/rpbpkm.web.id/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/rpbpkm.web.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 60M;

    location / {
        set $upstream_kong http://supabase-kong:8000;
        proxy_pass         $upstream_kong;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
